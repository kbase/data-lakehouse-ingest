name: Run tests

permissions:
  contents: read

on:
  push:
    branches:
      - develop
      - main

  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  code_format_lint:
    name: Run code formatting checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7.1.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run code formatting checks (ruff format --check)
        shell: bash -l {0}
        continue-on-error: false
        run: uv run ruff format --check

      - name: Run ruff lint
        run: uv run ruff check --output-format=github src tests

  spark_tests:
    name: Run Spark / container tests
    runs-on: ubuntu-latest
    needs: code_format_lint

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Pull Spark test container
        run: docker pull ghcr.io/berdatalakehouse/spark_notebook:main

      - name: Run tests inside Spark container
        shell: bash -l {0}
        continue-on-error: false
        run: |
          uv run pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5.5.1
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          # fail_ci_if_error: true

  tests:
    name: Run local tests (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: code_format_lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: ["ubuntu-24.04"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7.1.2
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run local tests (no Spark)
        shell: bash -l {0}
        continue-on-error: false
        run: uv run pytest -m "not requires_spark"
